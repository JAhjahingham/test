<script>
function init() {
    // Ensure all variables and DOM elements are ready
    const bird = {
        x: 50,
        y: 150,
        w: 30,
        h: 30,
        velocity: 0,
        jump: 5,
        draw: function() {
            this.drawBird();
        },
        drawBird: function() {
            ctx.fillStyle = "#ffeb3b";
            ctx.beginPath();
            ctx.arc(this.x + this.w/2, this.y + this.h/2, this.w/2, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = "#8bc34a";
            ctx.stroke();
        },
        flap: function() {
            this.velocity = -this.jump;
        },
        update: function() {
            this.y += this.velocity;
            if (this.y + this.h < 0) {
                this.y = 0;
                this.velocity = 0;
            }
            if (this.y > 300) {
                this.y = 0;
                this.velocity = 0;
            }
        },
        reset: function() {
            this.x = 50;
            this.y = 150;
            this.velocity = 0;
        },
        left: function() {
            this.x -= 5;
        },
        right: function() {
            this.x += 5;
        }
    };

    const background = {
        draw: function() {
            ctx.fillStyle = "#70c5ce";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ded895";
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = "#73bf2e";
            ctx.fillRect(0, canvas.height - 25, canvas.width, 5);
        }
    };

    const pipes = {
        draw: function() {
            ctx.fillStyle = "#4caf50";
            this.pipes.forEach(pipe => {
                ctx.fillRect(pipe.x, 0, pipe.w, pipe.y);
            });
        },
        update: function() {
            this.pipes.forEach(pipe => {
                pipe.x -= 1;
                if (pipe.x + pipe.w < 0 && !pipe.passed) {
                    pipe.passed = true;
                }
            });
        }
    };

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.canvas.width = 800;
    ctx.canvas.height = 600;

    const score = {
        value: 0,
        draw: function() {
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            ctx.fillText(this.value, 20, 40);
        }
    };

    const gameOver = function() {
        bird.reset();
        pipes.reset();
        score.value = 0;
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, 800, 600);
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 300, 300);
        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText("Click to Restart", 200, 400);
        canvas.style.display = "none";
    };

    const resetGame = function() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        score.value = 0;
        bird.y = 150;
        pipes.pipes = [];
        for(let i=0; i<5; i++) {
            pipes.pipes.push({
                x: 200,
                w: 50,
                y: 500 + (i*75)
            });
        }
        bird.x = 50;
        bird.velocity = 0;
        score.draw();
        gameOver();
    };

    const isPlaying = false;
    const bird = {
        ...bird,
        y: 300,
        velocity: 0,
        draw: function() {
            ctx.fillStyle = "#ffeb3b";
            ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
            ctx.fillStyle = "#8bc34a";
            ctx.fillRect(bird.x + bird.w/2 - 5, bird.y + bird.h - 5, 10, 10);
            ctx.fillStyle = "black";
            ctx.font = "20px Arial";
            ctx.fillText("Bird", bird.x + 10, bird.y + 30);
        },
        draw: function() {
            ctx.fillStyle = "#ffeb3b";
            ctx.beginPath();
            ctx.arc(bird.x + bird.w/2, bird.y + bird.h/2, bird.w/2, 0, Math.PI*2);
            ctx.fill();
        }
    };

    const startGame = function() {
        startScreen.classList.add("hidden");
        gameOverScreen.classList.add("hidden");
        resetState();
        isPlaying = true;
        bird.flap();
    };

    const resetState = function() {
        bird.reset();
        pipes.reset();
        score.value = 0;
        frames = 0;
        isGameOver = false;
        isPlaying = true;
    };

    const gameOver = function() {
        isGameOver = true;
        isPlaying = false;
        finalScoreElement.innerText = score.value;
        bestScoreElement.innerText = Math.max(score.value, parseInt(localStorage.getItem('flappy_best'))) || 0;
        gameOverScreen.classList.remove("hidden");
    };

    const resetGame = function() {
        startGame();
    };

    const updateScore = function() {
        if(isPlaying) score.value++;
        score.draw();
    };

    const loop = function() {
        if (isGameOver) {
            // Draw final frame just to lock the screen
            bird.draw();
            pipes.draw();
            return;
        }
        
        loop();
        updateScore();
    };

    const loop = function() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        background.draw();
        pipes.update();
        pipes.draw();
        bird.update();
        bird.draw();
        requestAnimationFrame(loop);
    };

    function loop() {
        if (!isPlaying) {
            if (isGameOver) {
                // Draw final frame just to lock the screen
                bird.draw();
                pipes.draw();
                return;
            }
        }

        if (isPlaying) {
            bird.update();
            pipes.update();
            frames++;
        }

        bird.draw();
        pipes.draw();
        requestAnimationFrame(loop);
    }

    // Controls & Events
    window.addEventListener('mousedown', () => {
        if (isPlaying) bird.flap();
    });

    window.addEventListener('keydown', e => {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
            if (isPlaying) bird.flap();
        }
        if (e.code === 'ArrowLeft') {
            bird.left();
        }
        if (e.code === 'ArrowRight') {
            bird.right();
        }
    });

    canvas.addEventListener('click', startGame);

    // Initialization
    const startScreen = document.createElement('div');
    const gameOverScreen = document.createElement('div');
    startScreen.style.position = "absolute";
    startScreen.style.top = "0";
    startScreen.style.left = "0";
    startScreen.style.width = "100%";
    startScreen.style.height = "100%";
    startScreen.style.backgroundColor = "rgba(0,0,0,0.5)";
    gameOverScreen.style.backgroundColor = "rgba(0,0,0,0.5)";

    const startScreenEl = document.createElement('div');
    startScreenEl.classList.add("start-screen");
    startScreenEl.style.backgroundColor = "#4caf50";
    startScreenEl.style.color = "white";
    startScreenEl.style.display = "flex";
    startScreenEl.style.justifyContent = "center";
    startScreenEl.style.alignItems = "center";
    startScreenEl.innerText = "FLAPPY BIRD GAME";

    const gameOverScreenEl = document.createElement('div');
    gameOverScreenEl.classList.add("game-over-screen");
    gameOverScreenEl.style.backgroundColor = "#f44336";
    gameOverScreenEl.style.color = "white";
    gameOverScreenEl.style.display = "flex";
    gameOverScreenEl.style.justifyContent = "center";
    gameOverScreenEl.style.alignItems = "center";
    gameOverScreenEl.innerText = "GAME OVER";

    startScreenEl.appendChild(score.valueElement);
    startScreenEl.appendChild(bird.drawElement);
    startScreenEl.appendChild(pipes.drawElement);
    startScreenEl.appendChild(score.drawElement);
    startScreenEl.appendChild(finalScoreElement);
    startScreenEl.appendChild(bestScoreElement);

    startScreenEl.appendChild(score.valueElement);
    startScreenEl.appendChild(bird.drawElement);
    startScreenEl.appendChild(pipes.drawElement);
    startScreenEl.appendChild(score.drawElement);
    startScreenEl.appendChild(finalScoreElement);
    startScreenEl.appendChild(bestScoreElement);

    gameOverScreenEl.appendChild(score.valueElement);
    gameOverScreenEl.appendChild(bird.drawElement);
    gameOverScreenEl.appendChild(pipes.drawElement);
    gameOverScreenEl.appendChild(score.drawElement);
    gameOverScreenEl.appendChild(finalScoreElement);
    gameOverScreenEl.appendChild(bestScoreElement);

    canvas.appendChild(startScreen);
    canvas.appendChild(gameOverScreen);
    ctx.canvas.width = 800;
    canvas.style.display = "block";
    
    // Initialize variables
    frames = 0;
    score.value = 0;
    isPlaying = false;
    gameOverScreen.classList.remove("hidden");

    loop();
    
    // Handle Window Resize
    window.addEventListener('resize', function() {
        // Adjust canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Redraw background
        background.draw();
        
        // Redraw pipes
        pipes.update();
        pipes.draw();
        
        // Redraw bird
        bird.draw();
        
        requestAnimationFrame(loop);
    });
}

document.addEventListener('DOMContentLoaded', init);

</script>
